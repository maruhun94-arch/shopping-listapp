<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card-header {
      background: #4f46e5;
      padding: 28px 32px 24px;
    }

    .card-header h1 {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .card-header .subtitle {
      color: #c7d2fe;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .desc-row {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
    }

    .desc-row label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .desc-row textarea {
      width: 100%;
      min-height: 64px;
      padding: 10px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.88rem;
      color: #374151;
      background: #fff;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    .desc-row textarea::placeholder {
      color: #d1d5db;
    }

    .desc-row textarea:focus {
      border-color: #4f46e5;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 10px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: transparent;
      font-size: 0.82rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
      font-weight: 600;
    }

    .list {
      list-style: none;
      min-height: 60px;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    .list-item:last-child { border-bottom: none; }

    .list-item:hover { background: #f9fafb; }

    .list-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      word-break: break-word;
      transition: all 0.2s;
    }

    .item-text.done {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #d1d5db;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #fee2e2;
      color: #ef4444;
    }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
      font-size: 0.82rem;
      color: #6b7280;
    }

    .clear-btn {
      background: transparent;
      border: none;
      color: #ef4444;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .clear-btn:hover { background: #fee2e2; }
    .clear-btn:disabled { color: #d1d5db; cursor: default; }
    .clear-btn:disabled:hover { background: transparent; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>쇼핑 리스트</h1>
      <p class="subtitle">오늘 사야 할 것들</p>
    </div>

    <div class="desc-row">
      <label for="desc">설명</label>
      <textarea id="desc" placeholder="이 쇼핑 목록에 대한 설명을 입력하세요..." maxlength="200"></textarea>
    </div>

    <div class="input-row">
      <input id="newItem" type="text" placeholder="아이템 입력..." maxlength="60" />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <ul class="list" id="list"></ul>

    <div class="card-footer">
      <span id="counter">0개 남음</span>
      <button class="clear-btn" id="clearBtn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');
    let filter = 'all';

    const descEl = document.getElementById('desc');
    descEl.value = localStorage.getItem('shopping-desc') || '';
    descEl.addEventListener('input', () => {
      localStorage.setItem('shopping-desc', descEl.value);
    });

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      const filtered = items.filter(item => {
        if (filter === 'active') return !item.done;
        if (filter === 'done') return item.done;
        return true;
      });

      if (filtered.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty';
        empty.textContent = '항목이 없습니다';
        list.appendChild(empty);
      } else {
        filtered.forEach(item => {
          const li = document.createElement('li');
          li.className = 'list-item';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = item.done;
          checkbox.addEventListener('change', () => toggle(item.id));

          const span = document.createElement('span');
          span.className = 'item-text' + (item.done ? ' done' : '');
          span.textContent = item.text;

          const btn = document.createElement('button');
          btn.className = 'delete-btn';
          btn.title = '삭제';
          btn.textContent = '✕';
          btn.addEventListener('click', () => remove(item.id));

          li.appendChild(checkbox);
          li.appendChild(span);
          li.appendChild(btn);
          list.appendChild(li);
        });
      }

      const remaining = items.filter(i => !i.done).length;
      document.getElementById('counter').textContent = `${remaining}개 남음`;

      const hasDone = items.some(i => i.done);
      document.getElementById('clearBtn').disabled = !hasDone;
    }

    function addItem() {
      const input = document.getElementById('newItem');
      const text = input.value.trim();
      if (!text) return;
      items.push({ id: crypto.randomUUID(), text, done: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) item.done = !item.done;
      save();
      render();
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('newItem').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
